server:
  port: 8082

spring:
  application:
    name: biometria-core-api
  security:
    oauth2:
      resourceserver:
        jwt:
          jwks-uri: http://localhost:8081/realms/vivo-poc/protocol/openid-connect/certs
          issuer-uri: http://localhost:8081/realms/vivo-poc

soap:
  legacy:
    url: http://localhost:8083/ws
    core-secret: ${INTERNAL_CORE_SECRET:core-api-internal-secret-poc}
    timeout:
      connect-ms: 3000
      read-ms: 5000

internal:
  security:
    gateway-secret: ${INTERNAL_GATEWAY_SECRET:gateway-internal-secret-poc}

management:
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.75, 0.95, 0.99
  tracing:
    sampling:
      probability: 1.0

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  config: classpath:logback-spring.xml
