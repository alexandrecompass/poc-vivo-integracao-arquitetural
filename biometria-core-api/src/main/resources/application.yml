server:
  port: 8082

spring:
  application:
    name: biometria-core-api
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/vivo-poc}
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8081/realms/vivo-poc/protocol/openid-connect/certs}

soap:
  legacy:
    url: http://localhost:8083/ws
    core-secret: ${INTERNAL_CORE_SECRET:core-api-internal-secret-poc}
    timeout:
      connect-ms: 3000
      read-ms: 5000

internal:
  security:
    gateway-secret: ${INTERNAL_GATEWAY_SECRET:${GATEWAY_SECRET:gateway-secret-poc}}

management:
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.75, 0.95, 0.99
  tracing:
    sampling:
      probability: 1.0

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    # Aponta para a spec via Gateway (mesma origem do Swagger UI) — evita CORS
    url: /api-docs
    disable-swagger-default-url: true
    oauth:
      client-id: parceiro-externo
      client-secret: parceiro-externo-secret
      # Token vai via Gateway (/auth/token → Keycloak) — sem CORS
      scopes: biometria:read
      use-pkce-with-authorization-code-grant: false
  # Usa X-Forwarded-Host do Gateway como base URL da spec — necessário para CORS-free Try it out
  use-fqn: false

logging:
  config: classpath:logback-spring.xml
